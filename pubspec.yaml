name: huda_allah_clone
description: "تطبيق هدى الله - تطبيق قرآني شامل"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.6

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  dartz: ^0.10.1

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path: ^1.8.3

  # Network
  dio: ^5.4.0
  retrofit: ^4.0.3
  cached_network_image: ^3.3.1
  connectivity_plus: ^5.0.2

  # Audio
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  audio_session: ^0.1.18

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Downloads
  flutter_downloader: ^1.11.4

  # Background Tasks
  workmanager: ^0.5.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI Components
  font_awesome_flutter: ^10.6.0
  hugeicons: ^0.0.7
  flutter_widget_from_html_core: ^0.14.11
  extended_image: ^8.2.0
  scrollable_positioned_list: ^0.3.8
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # Utilities
  intl: ^0.18.1
  path_provider: ^2.1.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  wakelock_plus: ^1.1.2
  permission_handler: ^11.1.0
  archive: ^3.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  drift_dev: ^2.14.1
  freezed: ^2.4.6
  injectable_generator: ^2.4.1
  retrofit_generator: ^8.0.6

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/fonts/ElMessiri/
    - assets/images/
    - assets/images/decorations/
    - assets/images/icons/
    - assets/images/logos/
    - assets/images/misc/
    - assets/images/placeholders/
    - assets/images/quran_decorations/
    - assets/images/containers/
    - assets/json/
    - assets/db/

  fonts:
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs.ttf
    - family: QCF_BSML
      fonts:
        - asset: assets/fonts/QCF_BSML.TTF
    - family: AbdoLine
      fonts:
        - asset: assets/fonts/AbdoLine.otf
    - family: Newmalazim
      fonts:
        - asset: assets/fonts/Newmalazim-Regular.otf
    - family: ElMessiri
      fonts:
        - asset: assets/fonts/ElMessiri/ElMessiri-Regular.ttf
        - asset: assets/fonts/ElMessiri/ElMessiri-Bold.ttf
          weight: 700
        - asset: assets/fonts/ElMessiri/ElMessiri-Medium.ttf
          weight: 500
        - asset: assets/fonts/ElMessiri/ElMessiri-SemiBold.ttf
          weight: 600
